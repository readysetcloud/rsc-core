name: Deploy to Production

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.ref_name }}

permissions:
  contents: read

env:
  BRANCH_NAME: ${{ github.event_name == 'workflow_dispatch' && github.ref_name || github.event_name == 'push' && github.ref }}

jobs:
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      ui: ${{ steps.filter.outputs.ui }}
      agent: ${{ steps.filter.outputs.agent }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - 'template.yaml'
              - 'samconfig.toml'
              - 'functions/**'
              - 'agent/**'
              - 'agent-runtime/**'
              - 'scripts/package-agent.mjs'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/deploy.yaml'
            ui:
              - 'ui/**'
              - 'scripts/publish-ui-assets.mjs'
              - '.github/workflows/deploy.yaml'
            agent:
              - 'agent/**'
              - '.github/workflows/deploy.yaml'

  predeploy-validations:
    name: Pre-deploy validations
    uses: ./.github/workflows/pre-deploy-validation.yaml

  deploy:
    name: Deploy backend (SAM)
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    steps:
      - uses: actions/checkout@v7
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: us-east-1
          aws-access-key-id: ${{ secrets.PROD_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.PROD_SECRET_KEY }}

      - name: SAM Build and Deploy
        run: |
          npm install -g esbuild
          npm ci

          # The agent package must be built before `sam build`
          # (functions/vectorize-turn.mjs bundles @readysetcloud/agent/memory),
          # and the NODE_22 runtime artifact staged + uploaded before deploy
          # (AgentCoreRuntime pulls it from the assets bucket).
          node scripts/package-agent.mjs
          ( cd agent-runtime/.artifact && zip -qr ../agent.zip . )
          # Version the artifact key by commit SHA so the AgentCoreRuntime
          # resource's Prefix changes each deploy. With a static key, CloudFormation
          # sees no diff and never rolls the runtime, so it keeps serving the old
          # bundle even after the new one is uploaded.
          AGENT_ARTIFACT_KEY="agent/agent-${GITHUB_SHA}.zip"
          aws s3 cp agent-runtime/agent.zip "s3://readysetcloud/${AGENT_ARTIFACT_KEY}"

          sam --info
          sam build --parallel

          sam deploy \
          --stack-name rsc-core \
          --resolve-s3 \
          --no-fail-on-empty-changeset \
          --capabilities CAPABILITY_IAM CAPABILITY_AUTO_EXPAND \
          --parameter-overrides UpdateGitHubSourceCode=true DefaultCacheName=readysetcloud BucketName=readysetcloud AgentArtifactKey=${AGENT_ARTIFACT_KEY} AmplifyAppId=${{ secrets.PROD_AMPLIFY_APP_ID }} SendgridApiKey=${{ secrets.SENDGRID }} GitHubPAT=${{ secrets.GITHUB }} OpenAIApiKey=${{ secrets.OPENAI }} MomentoApiKey=${{ secrets.MOMENTO }} RootDomainName=readysetcloud.io HostedZoneId=${{ secrets.HOSTED_ZONE_ID }}

  publish-ui:
    name: Publish UI package
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.ui == 'true' }}
    permissions:
      contents: read
      id-token: write # npm Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v7
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: us-east-1
          aws-access-key-id: ${{ secrets.PROD_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.PROD_SECRET_KEY }}

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Build and publish hosted assets
        run: |
          npm ci
          cd ui
          npm ci
          npm test
          npm run build
          cd ..
          node scripts/publish-ui-assets.mjs --bucket readysetcloud

      # Auth is npm Trusted Publishing (OIDC via id-token: write) — no npm
      # token secret. The trusted publisher on npmjs.com must point at this
      # repo + deploy.yaml. Requires a recent npm CLI for OIDC support.
      - name: Publish @readysetcloud/ui to npm
        working-directory: ui
        run: |
          # Pin to the latest stable npm 11.x. It supports OIDC Trusted
          # Publishing (>= 11.5.1) while avoiding `@latest`, which recently
          # resolved to a broken build missing the `sigstore` module and
          # failed provenance signing (npm/cli#9722).
          npm install -g npm@11
          VERSION=$(node -p "require('./package.json').version")
          if npm view "@readysetcloud/ui@$VERSION" version > /dev/null 2>&1; then
            echo "@readysetcloud/ui@$VERSION already on npm — skipping publish"
          else
            npm publish
            echo "Published @readysetcloud/ui@$VERSION"
          fi

  publish-agent:
    name: Publish agent package
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.agent == 'true' }}
    permissions:
      contents: read
      id-token: write # npm Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Build and test
        working-directory: agent
        run: |
          npm ci
          npm run typecheck
          npm test
          npm run build

      # Auth is npm Trusted Publishing (OIDC via id-token: write) — no npm
      # token secret. The trusted publisher on npmjs.com must point at this
      # repo + deploy.yaml. Requires a recent npm CLI for OIDC support.
      - name: Publish @readysetcloud/agent to npm
        working-directory: agent
        run: |
          # Pin to the latest stable npm 11.x for OIDC Trusted Publishing
          # (>= 11.5.1), avoiding `@latest` (see the ui publish job note).
          npm install -g npm@11
          VERSION=$(node -p "require('./package.json').version")
          if npm view "@readysetcloud/agent@$VERSION" version > /dev/null 2>&1; then
            echo "@readysetcloud/agent@$VERSION already on npm — skipping publish"
          else
            npm publish
            echo "Published @readysetcloud/agent@$VERSION"
          fi
