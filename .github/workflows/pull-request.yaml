name: Deploy to Stage via Pull Request

on:
  workflow_dispatch:
  pull_request:
    branches:
      main

concurrency:
  group: ${{ github.ref_name }}

permissions:
  contents: read

env:
  BRANCH_NAME: ${{ github.event_name == 'workflow_dispatch' && github.ref_name || github.event_name == 'pull_request' && github.head_ref }}

jobs:
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    if: ${{ github.actor != 'dependabot[bot]' }}
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      ui: ${{ steps.filter.outputs.ui }}
      agent: ${{ steps.filter.outputs.agent }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - 'template.yaml'
              - 'samconfig.toml'
              - 'functions/**'
              - 'agent/**'
              - 'agent-runtime/**'
              - 'scripts/package-agent.mjs'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/pull-request.yaml'
            ui:
              - 'ui/**'
              - 'scripts/publish-ui-assets.mjs'
              - '.github/workflows/pull-request.yaml'
            agent:
              - 'agent/**'
              - '.github/workflows/pull-request.yaml'

  predeploy-validations:
    name: Pre-deploy validations
    uses: ./.github/workflows/pre-deploy-validation.yaml

  deploy:
    name: Deploy backend (SAM)
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ github.actor != 'dependabot[bot]' && needs.changes.outputs.backend == 'true' }}
    steps:
      - uses: actions/checkout@v7
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: us-east-1
          aws-access-key-id: ${{ secrets.STAGE_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.STAGE_SECRET_KEY }}

      - name: SAM Build and Deploy
        run: |
          npm install -g esbuild
          npm ci

          # Build the agent package (inlined into the runtime bundle) and stage +
          # upload the NODE_22 runtime artifact before deploy (AgentCoreRuntime
          # pulls it from the bucket).
          node scripts/package-agent.mjs
          ( cd agent-runtime/.artifact && zip -qr ../agent.zip . )
          # Version the artifact key by commit SHA so the AgentCoreRuntime
          # resource's Prefix changes each deploy (a static key means CloudFormation
          # never rolls the runtime, leaving it on the old bundle).
          AGENT_ARTIFACT_KEY="agent/agent-${GITHUB_SHA}.zip"
          aws s3 cp agent-runtime/agent.zip "s3://readysetcloud-stage/${AGENT_ARTIFACT_KEY}"

          sam --info
          sam build --parallel

          sam deploy \
          --stack-name rsc-core \
          --resolve-s3 \
          --no-fail-on-empty-changeset \
          --capabilities CAPABILITY_IAM CAPABILITY_AUTO_EXPAND \
          --parameter-overrides UpdateGitHubSourceCode=false DefaultCacheName=readysetcloud-stage BucketName=readysetcloud-stage AgentArtifactKey=${AGENT_ARTIFACT_KEY} AmplifyAppId=${{ secrets.STAGE_AMPLIFY_APP_ID }} SendgridApiKey=${{ secrets.SENDGRID }} GitHubPAT=${{ secrets.GITHUB }} OpenAIApiKey=${{ secrets.OPENAI }} MomentoApiKey=${{ secrets.MOMENTO }}

  publish-ui:
    name: Publish UI hosted assets (stage)
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ github.actor != 'dependabot[bot]' && needs.changes.outputs.ui == 'true' }}
    steps:
      - uses: actions/checkout@v7
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: us-east-1
          aws-access-key-id: ${{ secrets.STAGE_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.STAGE_SECRET_KEY }}

      - uses: actions/setup-node@v7
        with:
          node-version: 22

      - name: Build and publish hosted assets
        run: |
          npm ci
          cd ui
          npm ci
          npm test
          npm run build
          cd ..
          node scripts/publish-ui-assets.mjs --bucket readysetcloud-stage

  validate-agent:
    name: Validate agent package
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ github.actor != 'dependabot[bot]' && needs.changes.outputs.agent == 'true' }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
      - name: Install, typecheck, test, build
        working-directory: agent
        run: |
          npm ci
          npm run typecheck
          npm test
          npm run build

  deploy-dependabot:
    name: Deploy Dependabot Updates
    if: ${{ github.actor == 'dependabot[bot]' && github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - uses: actions/checkout@v7
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: us-east-1
          aws-access-key-id: ${{ secrets.DEPENDABOT_STAGE_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.DEPENDABOT_STAGE_SECRET_KEY }}

      - name: SAM Build and Deploy
        run: |
          npm install -g esbuild
          npm ci

          # Build the agent package (inlined into the runtime bundle) and stage +
          # upload the NODE_22 runtime artifact before deploy (AgentCoreRuntime
          # pulls it from the bucket).
          node scripts/package-agent.mjs
          ( cd agent-runtime/.artifact && zip -qr ../agent.zip . )
          # Version the artifact key by commit SHA so the AgentCoreRuntime
          # resource's Prefix changes each deploy (a static key means CloudFormation
          # never rolls the runtime, leaving it on the old bundle).
          AGENT_ARTIFACT_KEY="agent/agent-${GITHUB_SHA}.zip"
          aws s3 cp agent-runtime/agent.zip "s3://readysetcloud-stage/${AGENT_ARTIFACT_KEY}"

          sam --info
          sam build --parallel

          sam deploy \
          --stack-name rsc-core \
          --resolve-s3 \
          --no-fail-on-empty-changeset \
          --capabilities CAPABILITY_IAM CAPABILITY_AUTO_EXPAND \
          --parameter-overrides UpdateGitHubSourceCode=false DefaultCacheName=readysetcloud-stage BucketName=readysetcloud-stage AgentArtifactKey=${AGENT_ARTIFACT_KEY} AmplifyAppId=${{ secrets.STAGE_AMPLIFY_APP_ID }} SendgridApiKey=${{ secrets.SENDGRID }} GitHubPAT=${{ secrets.GITHUB }} OpenAIApiKey=${{ secrets.OPENAI }} MomentoApiKey=${{ secrets.MOMENTO }}

  auto-merge-dependabot-update:
    name: Auto Merge Dependabot Update
    needs: [deploy-dependabot]
    if: ${{ github.actor == 'dependabot[bot]' && github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Dependabot metadata
        id: dependabot-metadata
        uses: dependabot/fetch-metadata@v3
      - uses: actions/checkout@v7
      - name: Approve a PR if not already approved
        if: ${{ steps.dependabot-metadata.outputs.update-type == 'version-update:semver-minor' || steps.dependabot-metadata.outputs.update-type == 'version-update:semver-patch' || steps.dependabot-metadata.outputs.package-ecosystem == 'github_actions' }}
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr checkout "$PR_URL" # sets the upstream metadata for `gh pr status`

          if [ "$(gh pr status --json reviewDecision -q .currentBranch.reviewDecision)" != "APPROVED" ]; then
            gh pr review --approve "$PR_URL"
          fi

          gh pr merge --auto --merge "$PR_URL"
