AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Core resources, components, and configuration for Ready, Set, Cloud!

Parameters:
  GitHubOwner:
    Type: String
    Default: readysetcloud
  GitHubRepo:
    Type: String
    Default: ready-set-cloud
  UpdateGitHubSourceCode:
    Type: String
    AllowedValues: ['true', 'false']
    Default: 'false'
  AdminEmail:
    Type: String
    Default: allenheltondev@gmail.com
  BucketName:
    Type: String
  AmplifyAppId:
    Type: String
  DefaultCacheName:
    Type: String
  SendgridApiKey:
    Type: String
    NoEcho: true
  GitHubPAT:
    Type: String
    NoEcho: true
  OpenAIApiKey:
    Type: String
    NoEcho: true
  MomentoApiKey:
    Type: String
    NoEcho: true
  RootDomainName:
    Type: String
    Default: ''
  HostedZoneId:
    Type: String
    Default: ''
  BedrockModelId:
    Type: String
    Default: us.amazon.nova-lite-v1:0
    Description: Chat model for the agent assistant (cross-region inference profile prefix included).
  EmbeddingModelId:
    Type: String
    Default: amazon.titan-embed-text-v2:0
    Description: >
      Embedding model for the agent's semantic memory (Titan v2 @ 1024 dims). If
      changed, ConversationMemoryIndex Dimension must match and existing vectors
      be re-embedded.
  AgentArtifactKey:
    Type: String
    Default: agent/agent.zip
    Description: S3 key (in the assets BucketName) of the packaged NODE_22 agent runtime artifact.
  McpAllowedHosts:
    Type: String
    Default: ''
    Description: >
      Comma-separated hosts a session's mcpServers urls may target (SSRF
      allowlist enforced by create-session). Empty (default) rejects any
      mcpServers — opt in explicitly. Add Booked's MCP host here once its
      server has a stable URL (issue #196).

Metadata:
  esbuild-properties: &esbuild-properties
    Format: esm
    Minify: true
    OutExtension:
      - .js=.mjs
    Target: es2020
    Sourcemap: false
    EntryPoints:
      - index.mjs
    Banner:
      - js=import { createRequire } from 'module'; const require = createRequire(import.meta.url);
    External:
      - '@aws-sdk/*'
      - sharp

Conditions:
  DeployCustomDomainSupport:
    !Not [!Equals [!Ref RootDomainName, '']]

Globals:
  Function:
    Runtime: nodejs24.x
    CodeUri: functions
    Architectures:
      - arm64
    Tracing: Active
    Timeout: 3
    MemorySize: 1280
    Environment:
      Variables:
        AWS_NODEJS_CONNECTION_REUSE_ENABLED: 1

Resources:
  RSCCoreTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  TableStreamFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - ddb-stream-handler.mjs
    Properties:
      Handler: ddb-stream-handler.handler
      Policies:
        - AWSLambdaBasicExecutionRole
        - Version: 2012-10-17
          Statement:
            - Effect: Allow
              Action: events:PutEvents
              Resource: !Sub arn:${AWS::Partition}:events:${AWS::Region}:${AWS::AccountId}:event-bus/default
            - Effect: Allow
              Action:
                - dynamodb:DescribeStream
                - dynamodb:GetRecords
                - dynamodb:GetShardIterator
                - dynamodb:ListStreams
              Resource: !Sub ${RSCCoreTable.Arn}/stream/*

  TableStream:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      EventSourceArn: !GetAtt RSCCoreTable.StreamArn
      FunctionName: !GetAtt TableStreamFunction.Arn
      StartingPosition: TRIM_HORIZON
      MaximumBatchingWindowInSeconds: 60
      BatchSize: 20
      FilterCriteria:
        Filters:
          - Pattern: '{ "dynamodb" : { "Keys" : { "sk" : { "S" : [ "tenant" ] } } } }'

  AddTenantPostConfirmationFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - add-tenant-post-confirmation.mjs
    Properties:
      Handler: add-tenant-post-confirmation.handler
      Policies:
        - AWSLambdaBasicExecutionRole
        - Version: 2012-10-17
          Statement:
            - Effect: Allow
              Action: dynamodb:PutItem
              Resource: !GetAtt RSCCoreTable.Arn
            - Effect: Allow
              Action: events:PutEvents
              Resource: !Sub arn:${AWS::Partition}:events:${AWS::Region}:${AWS::AccountId}:event-bus/default
      Environment:
        Variables:
          TABLE_NAME: !Ref RSCCoreTable

  UpdateTenantFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - update-tenant.mjs
    Properties:
      Handler: update-tenant.handler
      Policies:
        - AWSLambdaBasicExecutionRole
        - Version: 2012-10-17
          Statement:
            - Effect: Allow
              Action:
                - dynamodb:PutItem
                - dynamodb:GetItem
              Resource: !GetAtt RSCCoreTable.Arn
            - Effect: Allow
              Action: ssm:PutParameter
              Resource: !Sub arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/rsc/*
      Environment:
        Variables:
          TABLE_NAME: !Ref RSCCoreTable


  TriggerAmplifyBuildFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - trigger-amplify-build.mjs
    Properties:
      Handler: trigger-amplify-build.handler
      Policies:
        - AWSLambdaBasicExecutionRole
        - Version: 2012-10-17
          Statement:
            - Effect: Allow
              Action: amplify:StartJob
              Resource: !Sub arn:${AWS::Partition}:amplify:${AWS::Region}:${AWS::AccountId}:apps/${AmplifyAppId}/branches/master/jobs/*
      Environment:
        Variables:
          APP_ID: !Ref AmplifyAppId
      Events:
        Build:
          Type: EventBridgeRule
          Properties:
            Pattern:
              detail-type:
                - Trigger Site Rebuild

  NotifyOfBuildFailureFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - notify-of-build-failure.mjs
    Properties:
      Handler: notify-of-build-failure.handler
      Policies:
        - AWSLambdaBasicExecutionRole
        - Version: 2012-10-17
          Statement:
            - Effect: Allow
              Action: amplify:ListJobs
              Resource: !Sub arn:${AWS::Partition}:amplify:${AWS::Region}:${AWS::AccountId}:apps/${AmplifyAppId}/branches/master/jobs/*
            - Effect: Allow
              Action: secretsmanager:GetSecretValue
              Resource: !Ref Secrets
            - Effect: Allow
              Action: events:PutEvents
              Resource: !Sub arn:${AWS::Partition}:events:${AWS::Region}:${AWS::AccountId}:event-bus/default
      Environment:
        Variables:
          APP_ID: !Ref AmplifyAppId
          OWNER: !Ref GitHubOwner
          REPO: !Ref GitHubRepo
          SECRET_ID: !Ref Secrets
      Events:
        AmplifyBuildFailed:
          Type: EventBridgeRule
          Properties:
            Pattern:
              source:
                - aws.amplify
              detail-type:
                - Amplify Deployment Status Change
              detail:
                appId:
                  - !Ref AmplifyAppId
                jobStatus:
                  - FAILED

  AskOpenAIFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - ask-openai.mjs
    Properties:
      Handler: ask-openai.handler
      Timeout: 180
      Policies:
        - AWSLambdaBasicExecutionRole
        - Version: 2012-10-17
          Statement:
            - Effect: Allow
              Action: secretsmanager:GetSecretValue
              Resource: !Ref Secrets
      Environment:
        Variables:
          SECRET_ID: !Ref Secrets
          CACHE_NAME: !Ref DefaultCacheName
          CACHE_TTL: 3600

  AskOpenAIParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /readysetcloud/ask-openai
      Type: String
      Value: !GetAtt AskOpenAIFunction.Arn
      Description: Arn for the Ask ChatGPT Lambda function

  SendApiRequestFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - send-api-request.mjs
    Properties:
      Handler: send-api-request.handler
      Policies:
        - AWSLambdaBasicExecutionRole
        - Version: 2012-10-17
          Statement:
            - Effect: Allow
              Action: secretsmanager:GetSecretValue
              Resource: !Ref Secrets
      Environment:
        Variables:
          SECRET_ID: !Ref Secrets

  SendApiRequestParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /readysetcloud/send-api-request
      Type: String
      Value: !GetAtt SendApiRequestFunction.Arn
      Description: Arn for the Send API Request Lambda function

  SendEmailFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - send-email.mjs
    Properties:
      Handler: send-email.handler
      Policies:
        - AWSLambdaBasicExecutionRole
        - Version: 2012-10-17
          Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Ref Secrets
      Environment:
        Variables:
          SECRET_ID: !Ref Secrets
          FROM_EMAIL: !Ref AdminEmail
      Events:
        SendMailEvent:
          Type: EventBridgeRule
          Properties:
            Pattern:
              detail-type:
                - Send Email

  # ----------------------------------------------------------------------------
  # Badge Chest — cross-app gamification (badges, points, levels)
  #
  # Apps emit "Track Activity" events to the default bus (or POST them to the
  # CoreApi). ProcessActivityFunction is the rules engine: it counts activity,
  # awards badges from the central catalog, rolls points up into levels, and
  # emits "Badge Awarded" / "Level Up" events. The badge routes are served by
  # the shared CoreApi behind the Cognito user pool.
  #
  # CoreApi is the shared public API surface for rsc-core (badges today, more
  # core routes over time). In prod it is fronted by the pre-existing
  # api.${RootDomainName} custom domain under the /core base path
  # (e.g. https://api.readysetcloud.io/core); non-prod uses the execute-api URL.
  # ----------------------------------------------------------------------------
  # Logical ID intentionally differs from the old HttpApi (CoreApi):
  # CloudFormation cannot change a resource's Type in place, so the REST API is
  # a new resource that replaces it.
  CoreRestApi:
    Type: AWS::Serverless::Api
    Properties:
      # REST (v1) API so it can attach to the pre-existing api.${RootDomainName}
      # custom domain — a v1 domain only accepts REST base path mappings.
      StageName: Prod
      Auth:
        Authorizers:
          CognitoAuthorizer:
            UserPoolArn: !GetAtt CognitoUserPool.Arn
        DefaultAuthorizer: CognitoAuthorizer
        # Keep CORS preflight (OPTIONS) unauthenticated — browsers send no
        # Authorization header on preflight, so authorizing it breaks CORS.
        AddDefaultAuthorizerToCorsPreflight: false
      Cors:
        AllowOrigin: "'*'"
        AllowHeaders: "'authorization,content-type'"
        AllowMethods: "'GET,POST,OPTIONS'"

  BadgeProcessorDLQ:
    Type: AWS::SQS::Queue
    Properties:
      MessageRetentionPeriod: 1209600

  ProcessActivityFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - process-activity.mjs
    Properties:
      Handler: process-activity.handler
      Timeout: 15
      DeadLetterQueue:
        Type: SQS
        TargetArn: !GetAtt BadgeProcessorDLQ.Arn
      Policies:
        - AWSLambdaBasicExecutionRole
        - Version: 2012-10-17
          Statement:
            - Effect: Allow
              Action:
                - dynamodb:PutItem
                - dynamodb:UpdateItem
                - dynamodb:GetItem
                - dynamodb:Query
              Resource: !GetAtt RSCCoreTable.Arn
            - Effect: Allow
              Action: events:PutEvents
              Resource: !Sub arn:${AWS::Partition}:events:${AWS::Region}:${AWS::AccountId}:event-bus/default
      Environment:
        Variables:
          TABLE_NAME: !Ref RSCCoreTable
      Events:
        TrackActivity:
          Type: EventBridgeRule
          Properties:
            Pattern:
              detail-type:
                - Track Activity

  RecordActivityFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - record-activity.mjs
    Properties:
      Handler: record-activity.handler
      Timeout: 5
      Policies:
        - AWSLambdaBasicExecutionRole
        - Version: 2012-10-17
          Statement:
            - Effect: Allow
              Action: events:PutEvents
              Resource: !Sub arn:${AWS::Partition}:events:${AWS::Region}:${AWS::AccountId}:event-bus/default
      Events:
        RecordActivity:
          Type: Api
          Properties:
            RestApiId: !Ref CoreRestApi
            Path: /badges/activity
            Method: POST

  GetBadgeChestFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - get-badge-chest.mjs
    Properties:
      Handler: get-badge-chest.handler
      Timeout: 5
      Policies:
        - AWSLambdaBasicExecutionRole
        - Version: 2012-10-17
          Statement:
            - Effect: Allow
              Action: dynamodb:Query
              Resource: !GetAtt RSCCoreTable.Arn
      Environment:
        Variables:
          TABLE_NAME: !Ref RSCCoreTable
      Events:
        GetChest:
          Type: Api
          Properties:
            RestApiId: !Ref CoreRestApi
            Path: /badges/me
            Method: GET

  GetBadgeCatalogFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - get-badge-catalog.mjs
    Properties:
      Handler: get-badge-catalog.handler
      Timeout: 5
      Events:
        GetCatalog:
          Type: Api
          Properties:
            RestApiId: !Ref CoreRestApi
            Path: /badges/catalog
            Method: GET
            Auth:
              Authorizer: NONE

  CoreApiUrlParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /readysetcloud/api-url
      Type: String
      Value: !If
        - DeployCustomDomainSupport
        - !Sub https://api.${RootDomainName}/core
        - !Sub https://${CoreRestApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/Prod
      Description: Base URL of the shared rsc-core REST API (badge routes under /badges)

  # ----------------------------------------------------------------------------
  # Agent service — a Strands-TS assistant (@readysetcloud/agent) hosted in
  # AgentCore Runtime (NODE_22) that streams over a browser-direct WebSocket.
  #
  # Auth reuses the shared RSC Cognito pool: the browser calls
  # POST /agent/connect on the CoreApi (Cognito authorizer), and
  # WebSocketConnectFunction returns a SigV4-presigned wss:// URL carrying the
  # verified sub as a custom header so memory recall is scoped to the caller.
  #
  # Memory is owned here: conversation turns + Strands snapshots in AgentChatTable
  # (TTL expiresAt), semantic recall in an S3 Vectors index fed by the
  # stream-driven VectorizeTurnFunction.
  # ----------------------------------------------------------------------------
  AgentChatTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES

  MemoryVectorBucket:
    Type: AWS::S3Vectors::VectorBucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      VectorBucketName: !Sub 'rsc-agent-memory-${AWS::AccountId}'

  ConversationMemoryIndex:
    Type: AWS::S3Vectors::Index
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      VectorBucketArn: !GetAtt MemoryVectorBucket.VectorBucketArn
      IndexName: conversation-memory
      DataType: float32
      Dimension: 1024
      DistanceMetric: cosine
      MetadataConfiguration:
        NonFilterableMetadataKeys:
          - text

  VectorizeTurnDLQ:
    Type: AWS::SQS::Queue
    Properties:
      MessageRetentionPeriod: 1209600 # 14 days

  VectorizeTurnFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - vectorize-turn.mjs
    Properties:
      Handler: vectorize-turn.handler
      Timeout: 60
      Environment:
        Variables:
          VECTOR_BUCKET_NAME: !Sub 'rsc-agent-memory-${AWS::AccountId}'
          MEMORY_VECTOR_INDEX_NAME: conversation-memory
          EMBEDDING_MODEL_ID: !Ref EmbeddingModelId
      Events:
        TurnStream:
          Type: DynamoDB
          Properties:
            Stream: !GetAtt AgentChatTable.StreamArn
            StartingPosition: LATEST
            BatchSize: 5
            MaximumRetryAttempts: 3
            BisectBatchOnFunctionError: true
            # Only Turn rows reach the function: INSERT/MODIFY key off NewImage,
            # REMOVE off OldImage (REMOVE has no NewImage).
            FilterCriteria:
              Filters:
                - Pattern: '{"eventName":["INSERT","MODIFY"],"dynamodb":{"NewImage":{"entity":{"S":["Turn"]}}}}'
                - Pattern: '{"eventName":["REMOVE"],"dynamodb":{"OldImage":{"entity":{"S":["Turn"]}}}}'
            DestinationConfig:
              OnFailure:
                Destination: !GetAtt VectorizeTurnDLQ.Arn
      Policies:
        - AWSLambdaBasicExecutionRole
        - Version: 2012-10-17
          Statement:
            - Effect: Allow
              Action:
                - dynamodb:DescribeStream
                - dynamodb:GetRecords
                - dynamodb:GetShardIterator
                - dynamodb:ListStreams
              Resource:
                - !GetAtt AgentChatTable.StreamArn
                - !Sub '${AgentChatTable.StreamArn}/*'
            # Embed via Titan. Wildcard region/model so a model swap needs no IAM change.
            - Effect: Allow
              Action: bedrock:InvokeModel
              Resource: !Sub 'arn:${AWS::Partition}:bedrock:*::foundation-model/*'
            - Effect: Allow
              Action:
                - s3vectors:PutVectors
                - s3vectors:DeleteVectors
                - s3vectors:GetVectors
                - s3vectors:QueryVectors
              Resource:
                - !GetAtt MemoryVectorBucket.VectorBucketArn
                - !GetAtt ConversationMemoryIndex.IndexArn
            - Effect: Allow
              Action: sqs:SendMessage
              Resource: !GetAtt VectorizeTurnDLQ.Arn

  WebSocketConnectFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - websocket-connect.mjs
    Properties:
      Handler: websocket-connect.handler
      Timeout: 10
      Environment:
        Variables:
          AGENT_RUNTIME_ARN: !Sub 'arn:${AWS::Partition}:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:runtime/${AgentCoreRuntime}'
      Policies:
        - AWSLambdaBasicExecutionRole
        - Version: 2012-10-17
          Statement:
            # The signed URL grants the browser a WebSocket stream to the runtime.
            - Effect: Allow
              Action:
                - bedrock-agentcore:InvokeAgentRuntime
                - bedrock-agentcore:InvokeAgentRuntimeWithWebSocketStream
              Resource: !Sub 'arn:${AWS::Partition}:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:runtime/*'
      Events:
        PostAgentConnect:
          Type: Api
          Properties:
            RestApiId: !Ref CoreRestApi
            Path: /agent/connect
            Method: POST

  # Creates a session config row (owner = verified caller) that the runtime loads
  # by sessionId. Lets apps set prompt/model per conversation without a redeploy.
  CreateSessionFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - create-session.mjs
    Properties:
      Handler: create-session.handler
      Timeout: 10
      Environment:
        Variables:
          TABLE_NAME: !Ref AgentChatTable
          # Comma-separated hosts a session's MCP server urls may target. Empty
          # (default) rejects any mcpServers — set McpAllowedHosts to opt in.
          MCP_ALLOWED_HOSTS: !Ref McpAllowedHosts
      Policies:
        - AWSLambdaBasicExecutionRole
        - Version: 2012-10-17
          Statement:
            - Effect: Allow
              Action: dynamodb:PutItem
              Resource: !GetAtt AgentChatTable.Arn
      Events:
        PostAgentSession:
          Type: Api
          Properties:
            RestApiId: !Ref CoreRestApi
            Path: /agent/sessions
            Method: POST

  AgentCoreRuntime:
    Type: AWS::BedrockAgentCore::Runtime
    Properties:
      AgentRuntimeName: rsccore_agent
      AgentRuntimeArtifact:
        CodeConfiguration:
          Code:
            S3:
              Bucket: !Ref BucketName
              Prefix: !Ref AgentArtifactKey
          EntryPoint:
            # The esbuild bundle's entry (see agent-runtime/build.mjs). Verify this
            # literal against a real deploy — Node CodeZip EntryPoint conventions
            # differ from Python's agent.py, and cfn-lint's spec doesn't yet know
            # the Node runtimes.
            - index.js
          Runtime: NODE_22
      NetworkConfiguration:
        NetworkMode: PUBLIC
      RoleArn: !GetAtt AgentCoreRole.Arn
      EnvironmentVariables:
        TABLE_NAME: !Ref AgentChatTable
        VECTOR_BUCKET_NAME: !Sub 'rsc-agent-memory-${AWS::AccountId}'
        MEMORY_VECTOR_INDEX_NAME: conversation-memory
        EMBEDDING_MODEL_ID: !Ref EmbeddingModelId
        BEDROCK_MODEL_ID: !Ref BedrockModelId
        BEDROCK_REGION: !Ref AWS::Region

  AgentCoreRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: bedrock-agentcore.amazonaws.com
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
      Policies:
        - PolicyName: AgentCorePolicy
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              # Pull the artifact zip from the assets bucket.
              - Effect: Allow
                Action: s3:GetObject
                Resource: !Sub 'arn:${AWS::Partition}:s3:::${BucketName}/${AgentArtifactKey}'
              # Logs + tracing + metrics.
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - logs:DescribeLogStreams
                  - logs:DescribeLogGroups
                Resource: !Sub 'arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/bedrock-agentcore/*'
              - Effect: Allow
                Action:
                  - xray:PutTraceSegments
                  - xray:PutTelemetryRecords
                  - xray:GetSamplingRules
                  - xray:GetSamplingTargets
                Resource: '*'
              - Effect: Allow
                Action: cloudwatch:PutMetricData
                Resource: '*'
                Condition:
                  StringEquals:
                    cloudwatch:namespace: bedrock-agentcore
              # Chat + embedding model invocation.
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                Resource:
                  - !Sub 'arn:${AWS::Partition}:bedrock:*::foundation-model/*'
                  - !Sub 'arn:${AWS::Partition}:bedrock:${AWS::Region}:${AWS::AccountId}:inference-profile/*'
              # Conversation history + snapshots.
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:Query
                  - dynamodb:BatchWriteItem
                Resource: !GetAtt AgentChatTable.Arn
              # Semantic recall.
              - Effect: Allow
                Action:
                  - s3vectors:QueryVectors
                  - s3vectors:GetVectors
                Resource:
                  - !GetAtt MemoryVectorBucket.VectorBucketArn
                  - !GetAtt ConversationMemoryIndex.IndexArn

  Secrets:
    Type: AWS::SecretsManager::Secret
    Properties:
      SecretString:
        Fn::Sub:
          - |-
            {
              "momento": "${MomentoApiKey}",
              "github": "${GitHubPAT}",
              "sendgrid":"${SendgridApiKey}",
              "openai": "${OpenAIApiKey}"
            }
          - GitHubPAT: !Ref GitHubPAT
            SendgridApiKey: !Ref SendgridApiKey
            MomentoApiKey: !Ref MomentoApiKey
            OpenAIApiKey: !Ref OpenAIApiKey

  SecretsParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /readysetcloud/secrets
      Type: String
      Value: !Ref Secrets
      Description: Arn for the Secrets Manager Secret for API Keys

  GitHubOwnerParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /readysetcloud/github-owner
      Type: String
      Value: !Ref GitHubOwner
      Description: Owner of the Ready, Set, Cloud GitHub repository

  GitHubRepoParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /readysetcloud/github-repo
      Type: String
      Value: !Ref GitHubRepo
      Description: Repository name of the Ready, Set, Cloud GitHub repository

  UpdateGitHubSourceCodeParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /readysetcloud/update-github-source-code
      Type: String
      Value: !Ref UpdateGitHubSourceCode
      Description: Whether to update the GitHub source code automatically

  AdminEmailParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /readysetcloud/admin-email
      Type: String
      Value: !Ref AdminEmail
      Description: Email address of the Ready, Set, Cloud administrator

  AssetsBucketParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /readysetcloud/assets-bucket
      Type: String
      Value: !Ref BucketName
      Description: Name of the S3 bucket where static assets are stored

  AmplifyAppIdParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /readysetcloud/amplify-app-id
      Type: String
      Value: !Ref AmplifyAppId
      Description: App identifier for the Ready, Set, Cloud Amplify app

  CacheNameParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /readysetcloud/cache-name
      Type: String
      Value: !Ref DefaultCacheName
      Description: Name of the Momento cache to use by default

  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: RSCUserPool
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false

  FreeMembershipGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      Description: Free membership. Default group for new users
      GroupName: rsc-free
      UserPoolId: !Ref CognitoUserPool
      Precedence: 10

  ProMembershipGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      Description: Pro membership
      GroupName: rsc-pro
      UserPoolId: !Ref CognitoUserPool
      Precedence: 5

  AuthCertificate:
    Type: AWS::CertificateManager::Certificate
    Condition: DeployCustomDomainSupport
    Properties:
      DomainName: !Sub authenticate.${RootDomainName}
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Sub authenticate.${RootDomainName}
          HostedZoneId: !Ref HostedZoneId

  CognitoUserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Condition: DeployCustomDomainSupport
    Properties:
      UserPoolId: !Ref CognitoUserPool
      Domain: !Sub authenticate.${RootDomainName}
      CustomDomainConfig:
        CertificateArn: !Ref AuthCertificate

  CustomDomainDnsRecord:
    Type: AWS::Route53::RecordSet
    Condition: DeployCustomDomainSupport
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Sub authenticate.${RootDomainName}
      ResourceRecords:
        - !GetAtt CognitoUserPoolDomain.CloudFrontDistribution
      TTL: 300
      Type: CNAME

  # The api.${RootDomainName} custom domain already exists in API Gateway
  # (owned by another stack, along with its ACM cert and Route53 record), so we
  # do not create the domain, certificate, or DNS here. Instead we attach the
  # CoreApi under the /core base path of that existing domain.
  CoreApiMapping:
    Type: AWS::ApiGateway::BasePathMapping
    Condition: DeployCustomDomainSupport
    # The auto-generated stage must exist before the mapping can bind to it.
    DependsOn: CoreRestApiProdStage
    Properties:
      DomainName: !Sub api.${RootDomainName}
      RestApiId: !Ref CoreRestApi
      Stage: Prod
      BasePath: core

  CognitoUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: RSCUserPoolClient
      UserPoolId: !Ref CognitoUserPool
      AllowedOAuthFlows:
        - code
      AllowedOAuthScopes:
        - email
        - openid
        - profile
      CallbackURLs:
        - http://localhost:3000
        - http://localhost:3000/oauth2/idpresponse
      LogoutURLs:
        - http://localhost:3000/logout
      AllowedOAuthFlowsUserPoolClient: true
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH

  CognitoUserPoolIdParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /readysetcloud/auth/user-pool-id
      Type: String
      Value: !Ref CognitoUserPool
      Description: Cognito user pool ID for cross-service authorizer references

  CognitoUserPoolArnParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /readysetcloud/auth/user-pool-arn
      Type: String
      Value: !GetAtt CognitoUserPool.Arn
      Description: Cognito user pool ARN for cross-service authorizer references

  CognitoUserPoolClientIdParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /readysetcloud/auth/user-pool-client-id
      Type: String
      Value: !Ref CognitoUserPoolClient
      Description: Cognito user pool client ID for cross-service token issuance

  CognitoIdentityPool:
    Type: AWS::Cognito::IdentityPool
    Properties:
      IdentityPoolName: RSCIdentityPool
      AllowUnauthenticatedIdentities: false
      CognitoIdentityProviders:
        - ClientId: !Ref CognitoUserPoolClient
          ProviderName: !Sub cognito-idp.${AWS::Region}.amazonaws.com/${CognitoUserPool}

  CognitoAuthenticatedRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: 'Allow'
          Principal:
            Federated: 'cognito-identity.amazonaws.com'
          Action: 'sts:AssumeRoleWithWebIdentity'
          Condition:
            StringEquals:
              'cognito-identity.amazonaws.com:aud': !Ref CognitoIdentityPool
            'ForAnyValue:StringLike':
              'cognito-identity.amazonaws.com:amr': authenticated

  CognitoIdentityPoolRoles:
    Type: AWS::Cognito::IdentityPoolRoleAttachment
    Properties:
      IdentityPoolId: !Ref CognitoIdentityPool
      Roles:
        authenticated: !GetAtt CognitoAuthenticatedRole.Arn

  WebPBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref BucketName
      PolicyDocument:
        Statement:
          - Sid: PublicReadAllFiles
            Effect: Allow
            Principal: '*'
            Action: s3:GetObject
            Resource: !Sub 'arn:${AWS::Partition}:s3:::${BucketName}/*.webp'
          - Sid: PublicReadUiAssets
            Effect: Allow
            Principal: '*'
            Action: s3:GetObject
            Resource: !Sub 'arn:${AWS::Partition}:s3:::${BucketName}/ui/*'

  ImageResizing:
    Type: AWS::Serverless::Application
    Properties:
      Location:
        ApplicationId: arn:aws:serverlessrepo:us-east-1:745159065988:applications/image-optimizer-for-blogs
        SemanticVersion: 1.0.1
      Parameters:
        RootDomainName: !Ref RootDomainName
        HostedZoneId: !Ref HostedZoneId
        S3BucketName: !Ref BucketName
