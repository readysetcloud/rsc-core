AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Core resources, components, and configuration for Ready, Set, Cloud!

Parameters:
  GitHubOwner:
    Type: String
    Default: readysetcloud
  GitHubRepo:
    Type: String
    Default: ready-set-cloud
  UpdateGitHubSourceCode:
    Type: String
    AllowedValues: ['true', 'false']
    Default: 'false'
  AdminEmail:
    Type: String
    Default: allenheltondev@gmail.com
  BucketName:
    Type: String
  AmplifyAppId:
    Type: String
  DefaultCacheName:
    Type: String
  SendgridApiKey:
    Type: String
    NoEcho: true
  GitHubPAT:
    Type: String
    NoEcho: true
  OpenAIApiKey:
    Type: String
    NoEcho: true
  MomentoApiKey:
    Type: String
    NoEcho: true
  RootDomainName:
    Type: String
    Default: ''
  HostedZoneId:
    Type: String
    Default: ''
  BedrockModelId:
    Type: String
    Default: us.amazon.nova-lite-v1:0
    Description: Chat model for the agent assistant (cross-region inference profile prefix included).
  AgentArtifactKey:
    Type: String
    Default: agent/agent.zip
    Description: >
      S3 key (in the assets BucketName) of the packaged NODE_22 agent runtime
      artifact. MUST be unique per artifact build — the deploy passes a
      commit-SHA-versioned key. If this is left at a STATIC value, the
      AgentCoreRuntime resource's Prefix never changes, CloudFormation sees no
      diff, and the runtime keeps serving the OLD bundle even after a new one is
      uploaded (agent-runtime code changes silently never take effect). Do not
      "simplify" the deploy back to a fixed key. The static default here is only a
      last-resort fallback for a first-ever create.
  McpAllowedHosts:
    Type: String
    Default: ''
    Description: >
      Comma-separated hosts a session's mcpServers urls may target (SSRF
      allowlist enforced by create-session). Empty (default) rejects any
      mcpServers — opt in explicitly. Add Booked's MCP host here once its
      server has a stable URL (issue #196).
  SystemTaskPrincipals:
    Type: String
    Default: ''
    Description: >
      Comma-separated `sub:systemId` grants authorizing a caller to launch an
      autonomous task as a system principal via POST /agent/tasks (a `sub:*`
      grant allows any system id for that sub). Empty (default) rejects all
      system-scoped API requests — opt in explicitly, like McpAllowedHosts.
      First-party backends that emit "Run Agent Task" events are unaffected.

Metadata:
  esbuild-properties: &esbuild-properties
    Format: esm
    Minify: true
    OutExtension:
      - .js=.mjs
    Target: es2020
    Sourcemap: false
    EntryPoints:
      - index.mjs
    Banner:
      - js=import { createRequire } from 'module'; const require = createRequire(import.meta.url);
    External:
      - '@aws-sdk/*'
      - sharp

Conditions:
  DeployCustomDomainSupport:
    !Not [!Equals [!Ref RootDomainName, '']]

Globals:
  Function:
    Runtime: nodejs24.x
    CodeUri: functions
    Architectures:
      - arm64
    Tracing: Active
    Timeout: 3
    MemorySize: 1280
    Environment:
      Variables:
        AWS_NODEJS_CONNECTION_REUSE_ENABLED: 1

Resources:
  RSCCoreTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  TableStreamFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - ddb-stream-handler.mjs
    Properties:
      Handler: ddb-stream-handler.handler
      Policies:
        - AWSLambdaBasicExecutionRole
        - Version: 2012-10-17
          Statement:
            - Effect: Allow
              Action: events:PutEvents
              Resource: !Sub arn:${AWS::Partition}:events:${AWS::Region}:${AWS::AccountId}:event-bus/default
            - Effect: Allow
              Action:
                - dynamodb:DescribeStream
                - dynamodb:GetRecords
                - dynamodb:GetShardIterator
                - dynamodb:ListStreams
              Resource: !Sub ${RSCCoreTable.Arn}/stream/*

  TableStream:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      EventSourceArn: !GetAtt RSCCoreTable.StreamArn
      FunctionName: !GetAtt TableStreamFunction.Arn
      StartingPosition: TRIM_HORIZON
      MaximumBatchingWindowInSeconds: 60
      BatchSize: 20
      FilterCriteria:
        Filters:
          - Pattern: '{ "dynamodb" : { "Keys" : { "sk" : { "S" : [ "tenant" ] } } } }'

  AddTenantPostConfirmationFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - add-tenant-post-confirmation.mjs
    Properties:
      Handler: add-tenant-post-confirmation.handler
      Policies:
        - AWSLambdaBasicExecutionRole
        - Version: 2012-10-17
          Statement:
            - Effect: Allow
              Action: dynamodb:PutItem
              Resource: !GetAtt RSCCoreTable.Arn
            - Effect: Allow
              Action: events:PutEvents
              Resource: !Sub arn:${AWS::Partition}:events:${AWS::Region}:${AWS::AccountId}:event-bus/default
      Environment:
        Variables:
          TABLE_NAME: !Ref RSCCoreTable

  UpdateTenantFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - update-tenant.mjs
    Properties:
      Handler: update-tenant.handler
      Policies:
        - AWSLambdaBasicExecutionRole
        - Version: 2012-10-17
          Statement:
            - Effect: Allow
              Action:
                - dynamodb:PutItem
                - dynamodb:GetItem
              Resource: !GetAtt RSCCoreTable.Arn
            - Effect: Allow
              Action: ssm:PutParameter
              Resource: !Sub arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/rsc/*
      Environment:
        Variables:
          TABLE_NAME: !Ref RSCCoreTable


  TriggerAmplifyBuildFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - trigger-amplify-build.mjs
    Properties:
      Handler: trigger-amplify-build.handler
      Policies:
        - AWSLambdaBasicExecutionRole
        - Version: 2012-10-17
          Statement:
            - Effect: Allow
              Action: amplify:StartJob
              Resource: !Sub arn:${AWS::Partition}:amplify:${AWS::Region}:${AWS::AccountId}:apps/${AmplifyAppId}/branches/master/jobs/*
      Environment:
        Variables:
          APP_ID: !Ref AmplifyAppId
      Events:
        Build:
          Type: EventBridgeRule
          Properties:
            Pattern:
              detail-type:
                - Trigger Site Rebuild

  NotifyOfBuildFailureFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - notify-of-build-failure.mjs
    Properties:
      Handler: notify-of-build-failure.handler
      Policies:
        - AWSLambdaBasicExecutionRole
        - Version: 2012-10-17
          Statement:
            - Effect: Allow
              Action: amplify:ListJobs
              Resource: !Sub arn:${AWS::Partition}:amplify:${AWS::Region}:${AWS::AccountId}:apps/${AmplifyAppId}/branches/master/jobs/*
            - Effect: Allow
              Action: secretsmanager:GetSecretValue
              Resource: !Ref Secrets
            - Effect: Allow
              Action: events:PutEvents
              Resource: !Sub arn:${AWS::Partition}:events:${AWS::Region}:${AWS::AccountId}:event-bus/default
      Environment:
        Variables:
          APP_ID: !Ref AmplifyAppId
          OWNER: !Ref GitHubOwner
          REPO: !Ref GitHubRepo
          SECRET_ID: !Ref Secrets
      Events:
        AmplifyBuildFailed:
          Type: EventBridgeRule
          Properties:
            Pattern:
              source:
                - aws.amplify
              detail-type:
                - Amplify Deployment Status Change
              detail:
                appId:
                  - !Ref AmplifyAppId
                jobStatus:
                  - FAILED

  AskOpenAIFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - ask-openai.mjs
    Properties:
      Handler: ask-openai.handler
      Timeout: 180
      Policies:
        - AWSLambdaBasicExecutionRole
        - Version: 2012-10-17
          Statement:
            - Effect: Allow
              Action: secretsmanager:GetSecretValue
              Resource: !Ref Secrets
      Environment:
        Variables:
          SECRET_ID: !Ref Secrets
          CACHE_NAME: !Ref DefaultCacheName
          CACHE_TTL: 3600

  AskOpenAIParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /readysetcloud/ask-openai
      Type: String
      Value: !GetAtt AskOpenAIFunction.Arn
      Description: Arn for the Ask ChatGPT Lambda function

  SendApiRequestFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - send-api-request.mjs
    Properties:
      Handler: send-api-request.handler
      Policies:
        - AWSLambdaBasicExecutionRole
        - Version: 2012-10-17
          Statement:
            - Effect: Allow
              Action: secretsmanager:GetSecretValue
              Resource: !Ref Secrets
      Environment:
        Variables:
          SECRET_ID: !Ref Secrets

  SendApiRequestParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /readysetcloud/send-api-request
      Type: String
      Value: !GetAtt SendApiRequestFunction.Arn
      Description: Arn for the Send API Request Lambda function

  SendEmailFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - send-email.mjs
    Properties:
      Handler: send-email.handler
      Policies:
        - AWSLambdaBasicExecutionRole
        - Version: 2012-10-17
          Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Ref Secrets
      Environment:
        Variables:
          SECRET_ID: !Ref Secrets
          FROM_EMAIL: !Ref AdminEmail
      Events:
        SendMailEvent:
          Type: EventBridgeRule
          Properties:
            Pattern:
              detail-type:
                - Send Email

  # ----------------------------------------------------------------------------
  # Badge Chest — cross-app gamification (badges, points, levels)
  #
  # Apps emit "Track Activity" events to the default bus (or POST them to the
  # CoreApi). ProcessActivityFunction is the rules engine: it counts activity,
  # awards badges from the central catalog, rolls points up into levels, and
  # emits "Badge Awarded" / "Level Up" events. The badge routes are served by
  # the shared CoreApi behind the Cognito user pool.
  #
  # CoreApi is the shared public API surface for rsc-core (badges today, more
  # core routes over time). In prod it is fronted by the pre-existing
  # api.${RootDomainName} custom domain under the /core base path
  # (e.g. https://api.readysetcloud.io/core); non-prod uses the execute-api URL.
  # ----------------------------------------------------------------------------
  # Logical ID intentionally differs from the old HttpApi (CoreApi):
  # CloudFormation cannot change a resource's Type in place, so the REST API is
  # a new resource that replaces it.
  CoreRestApi:
    Type: AWS::Serverless::Api
    Properties:
      # REST (v1) API so it can attach to the pre-existing api.${RootDomainName}
      # custom domain — a v1 domain only accepts REST base path mappings.
      StageName: Prod
      Auth:
        Authorizers:
          CognitoAuthorizer:
            UserPoolArn: !GetAtt CognitoUserPool.Arn
        DefaultAuthorizer: CognitoAuthorizer
        # Keep CORS preflight (OPTIONS) unauthenticated — browsers send no
        # Authorization header on preflight, so authorizing it breaks CORS.
        AddDefaultAuthorizerToCorsPreflight: false
      Cors:
        AllowOrigin: "'*'"
        AllowHeaders: "'authorization,content-type'"
        AllowMethods: "'GET,POST,OPTIONS'"

  BadgeProcessorDLQ:
    Type: AWS::SQS::Queue
    Properties:
      MessageRetentionPeriod: 1209600

  ProcessActivityFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - process-activity.mjs
    Properties:
      Handler: process-activity.handler
      Timeout: 15
      DeadLetterQueue:
        Type: SQS
        TargetArn: !GetAtt BadgeProcessorDLQ.Arn
      Policies:
        - AWSLambdaBasicExecutionRole
        - Version: 2012-10-17
          Statement:
            - Effect: Allow
              Action:
                - dynamodb:PutItem
                - dynamodb:UpdateItem
                - dynamodb:GetItem
                - dynamodb:Query
              Resource: !GetAtt RSCCoreTable.Arn
            - Effect: Allow
              Action: events:PutEvents
              Resource: !Sub arn:${AWS::Partition}:events:${AWS::Region}:${AWS::AccountId}:event-bus/default
      Environment:
        Variables:
          TABLE_NAME: !Ref RSCCoreTable
      Events:
        TrackActivity:
          Type: EventBridgeRule
          Properties:
            Pattern:
              detail-type:
                - Track Activity

  RecordActivityFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - record-activity.mjs
    Properties:
      Handler: record-activity.handler
      Timeout: 5
      Policies:
        - AWSLambdaBasicExecutionRole
        - Version: 2012-10-17
          Statement:
            - Effect: Allow
              Action: events:PutEvents
              Resource: !Sub arn:${AWS::Partition}:events:${AWS::Region}:${AWS::AccountId}:event-bus/default
      Events:
        RecordActivity:
          Type: Api
          Properties:
            RestApiId: !Ref CoreRestApi
            Path: /badges/activity
            Method: POST

  GetBadgeChestFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - get-badge-chest.mjs
    Properties:
      Handler: get-badge-chest.handler
      Timeout: 5
      Policies:
        - AWSLambdaBasicExecutionRole
        - Version: 2012-10-17
          Statement:
            - Effect: Allow
              Action: dynamodb:Query
              Resource: !GetAtt RSCCoreTable.Arn
      Environment:
        Variables:
          TABLE_NAME: !Ref RSCCoreTable
      Events:
        GetChest:
          Type: Api
          Properties:
            RestApiId: !Ref CoreRestApi
            Path: /badges/me
            Method: GET

  GetBadgeCatalogFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - get-badge-catalog.mjs
    Properties:
      Handler: get-badge-catalog.handler
      Timeout: 5
      Events:
        GetCatalog:
          Type: Api
          Properties:
            RestApiId: !Ref CoreRestApi
            Path: /badges/catalog
            Method: GET
            Auth:
              Authorizer: NONE

  CoreApiUrlParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /readysetcloud/api-url
      Type: String
      Value: !If
        - DeployCustomDomainSupport
        - !Sub https://api.${RootDomainName}/core
        - !Sub https://${CoreRestApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/Prod
      Description: Base URL of the shared rsc-core REST API (badge routes under /badges)

  # ----------------------------------------------------------------------------
  # Agent service — a Strands-TS assistant (@readysetcloud/agent) hosted in
  # AgentCore Runtime (NODE_22) that streams over a browser-direct WebSocket.
  #
  # Auth reuses the shared RSC Cognito pool: the browser calls
  # POST /agent/connect on the CoreApi (Cognito authorizer) for the wss:// URL,
  # then opens the socket presenting its Cognito JWT as an OAuth bearer. The
  # runtime's inbound JWT authorizer validates it and the runtime reads the
  # verified sub, so memory recall is scoped to the real caller.
  #
  # Memory is two-plane: Strands conversation snapshots (within/across-connection
  # continuity) live in AgentChatTable (TTL expiresAt); cross-session semantic
  # memory (facts + user preferences) is the managed AgentCore Memory resource
  # (AgentMemory) — the runtime writes turns via createEvent and AgentCore
  # extracts + serves them, replacing the old S3 Vectors + Titan + vectorizer.
  # ----------------------------------------------------------------------------
  AgentChatTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true
      # No stream needed: memory is no longer built from a DynamoDB-stream
      # vectorizer. This table now holds only Strands conversation snapshots.

  # Managed cross-session memory. The runtime writes each turn via createEvent
  # (short-term events, kept EventExpiryDuration days), and AgentCore
  # asynchronously extracts long-term records per strategy into the namespaces
  # below. {actorId} is the verified Cognito sub, so memory is per-user; the
  # runtime resolves it and reads /facts/<sub> and /users/<sub>/preferences
  # (agent-runtime/src/index.ts). Replaces MemoryVectorBucket + the vectorizer.
  AgentMemory:
    Type: AWS::BedrockAgentCore::Memory
    Properties:
      Name: rsccore_agent_memory
      Description: Cross-session conversation memory for the RSC agent
      # Raw event retention (days). Matches the old 30-day turn TTL.
      EventExpiryDuration: 30
      MemoryExecutionRoleArn: !GetAtt AgentMemoryRole.Arn
      MemoryStrategies:
        # Facts: the direct successor to the old raw-turn semantic recall.
        - SemanticMemoryStrategy:
            Name: facts
            NamespaceTemplates:
              - /facts/{actorId}
        # Durable user preferences/style, personalized across sessions.
        - UserPreferenceMemoryStrategy:
            Name: preferences
            NamespaceTemplates:
              - /users/{actorId}/preferences

  # Role AgentCore assumes to run extraction (it invokes a Bedrock model to
  # distill events into memory records).
  AgentMemoryRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: bedrock-agentcore.amazonaws.com
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
      Policies:
        - PolicyName: AgentMemoryExtraction
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                Resource:
                  - !Sub 'arn:${AWS::Partition}:bedrock:*::foundation-model/*'
                  - !Sub 'arn:${AWS::Partition}:bedrock:${AWS::Region}:${AWS::AccountId}:inference-profile/*'

  WebSocketConnectFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - websocket-connect.mjs
    Properties:
      Handler: websocket-connect.handler
      Timeout: 10
      Environment:
        Variables:
          AGENT_RUNTIME_ARN: !Sub 'arn:${AWS::Partition}:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:runtime/${AgentCoreRuntime}'
          # When a custom domain is deployed, hand the browser a wss:// URL that
          # points at the CloudFront reverse proxy (ChatProxyDistribution) instead
          # of the raw bedrock-agentcore host, so the account id in the runtime ARN
          # never appears in the client-visible URL. Unset (no custom domain) =>
          # the Lambda returns the direct runtime URL.
          PROXY_WSS_HOST: !If [DeployCustomDomainSupport, !Sub 'chat.${RootDomainName}', !Ref 'AWS::NoValue']
      # No bedrock-agentcore invoke permission needed: the connection is
      # authorized by the caller's Cognito JWT (AgentCore Inbound Auth), not by
      # this Lambda's role. It only builds a URL — see websocket-connect.mjs.
      Policies:
        - AWSLambdaBasicExecutionRole
      Events:
        PostAgentConnect:
          Type: Api
          Properties:
            RestApiId: !Ref CoreRestApi
            Path: /agent/connect
            Method: POST

  # Creates a session config row (owner = verified caller) that the runtime loads
  # by sessionId. Lets apps set prompt/model per conversation without a redeploy.
  CreateSessionFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - create-session.mjs
    Properties:
      Handler: create-session.handler
      Timeout: 10
      Environment:
        Variables:
          TABLE_NAME: !Ref AgentChatTable
          # Comma-separated hosts a session's MCP server urls may target. Empty
          # (default) rejects any mcpServers — set McpAllowedHosts to opt in.
          MCP_ALLOWED_HOSTS: !Ref McpAllowedHosts
      Policies:
        - AWSLambdaBasicExecutionRole
        - Version: 2012-10-17
          Statement:
            - Effect: Allow
              Action: dynamodb:PutItem
              Resource: !GetAtt AgentChatTable.Arn
      Events:
        PostAgentSession:
          Type: Api
          Properties:
            RestApiId: !Ref CoreRestApi
            Path: /agent/sessions
            Method: POST

  # Event-driven session creation. A separate stack (e.g. Booked) that wants an
  # agent session emits a "Create Agent Session" event on the default bus via
  # @readysetcloud/agent `requestSession` — it needs only events:PutEvents, not
  # cross-stack access to AgentChatTable. This consumer writes the config row
  # here, where the table lives. Mirrors the Badge Chest "Track Activity" handoff.
  CreateSessionFromEventFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - create-session-from-event.mjs
    Properties:
      Handler: create-session-from-event.handler
      Timeout: 10
      Environment:
        Variables:
          TABLE_NAME: !Ref AgentChatTable
      Policies:
        - AWSLambdaBasicExecutionRole
        - Version: 2012-10-17
          Statement:
            - Effect: Allow
              Action: dynamodb:PutItem
              Resource: !GetAtt AgentChatTable.Arn
      Events:
        SessionRequest:
          Type: EventBridgeRule
          Properties:
            Pattern:
              source:
                - readysetcloud.agent
              detail-type:
                - Create Agent Session

  # ----------------------------------------------------------------------------
  # Autonomous (non-chat) agent tasks. A caller triggers a one-shot "do something"
  # run through the same secure runtime — no browser, no socket. Two triggers:
  #   * POST /agent/tasks (CreateTaskFunction) — authenticated, verified sub is
  #     the task's `user` principal; `wait` returns the result inline for a quick
  #     run, else 202 + event.
  #   * "Run Agent Task" event (a first-party backend via @readysetcloud/agent
  #     `requestAgentTask`) — decoupled, and the path a `system` principal uses.
  # Both land on RunAgentTaskFunction, which invokes the runtime; the runtime owns
  # the durable lifecycle (task row) and emits "Agent Task Completed".
  # ----------------------------------------------------------------------------

  # POST /agent/tasks — create + trigger a task; optionally wait for the result.
  CreateTaskFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - create-task.mjs
    Properties:
      Handler: create-task.handler
      # Covers the ~25s synchronous `wait` budget plus overhead (still under the
      # CoreApi REST ~29s integration timeout).
      Timeout: 29
      Environment:
        Variables:
          TABLE_NAME: !Ref AgentChatTable
          # `sub:systemId` grants authorizing a system-scoped task via the API.
          # Empty rejects all system requests (opt-in) — see create-task.mjs.
          SYSTEM_TASK_PRINCIPALS: !Ref SystemTaskPrincipals
      Policies:
        - AWSLambdaBasicExecutionRole
        - Version: 2012-10-17
          Statement:
            # Write the PENDING row + poll it for the wait path.
            - Effect: Allow
              Action:
                - dynamodb:PutItem
                - dynamodb:GetItem
              Resource: !GetAtt AgentChatTable.Arn
            # Trigger the run ("Run Agent Task").
            - Effect: Allow
              Action: events:PutEvents
              Resource: !Sub arn:${AWS::Partition}:events:${AWS::Region}:${AWS::AccountId}:event-bus/default
      Events:
        PostAgentTask:
          Type: Api
          Properties:
            RestApiId: !Ref CoreRestApi
            Path: /agent/tasks
            Method: POST

  # GET /agent/tasks/{taskId} — read a task's status/result (owner only).
  GetTaskFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - get-task.mjs
    Properties:
      Handler: get-task.handler
      Timeout: 10
      Environment:
        Variables:
          TABLE_NAME: !Ref AgentChatTable
      Policies:
        - AWSLambdaBasicExecutionRole
        - Version: 2012-10-17
          Statement:
            - Effect: Allow
              Action: dynamodb:GetItem
              Resource: !GetAtt AgentChatTable.Arn
      Events:
        GetAgentTask:
          Type: Api
          Properties:
            RestApiId: !Ref CoreRestApi
            Path: /agent/tasks/{taskId}
            Method: GET

  # Consumes "Run Agent Task" and invokes the runtime to run it in the secure
  # environment. The runtime writes the task row and emits "Agent Task Completed";
  # this only triggers it, so a duplicate delivery is harmless (idempotent claim).
  RunAgentTaskFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - run-agent-task.mjs
    Properties:
      Handler: run-agent-task.handler
      # A long autonomous run blocks the synchronous InvokeAgentRuntime call; this
      # consumer isn't behind the API gateway, so it can wait well past 29s.
      Timeout: 300
      Environment:
        Variables:
          AGENT_RUNTIME_ARN: !Sub 'arn:${AWS::Partition}:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:runtime/${AgentCoreRuntime}'
      Policies:
        - AWSLambdaBasicExecutionRole
        - Version: 2012-10-17
          Statement:
            - Effect: Allow
              Action: bedrock-agentcore:InvokeAgentRuntime
              Resource:
                - !Sub 'arn:${AWS::Partition}:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:runtime/${AgentCoreRuntime}'
                - !Sub 'arn:${AWS::Partition}:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:runtime/${AgentCoreRuntime}/*'
      Events:
        TaskRequest:
          Type: EventBridgeRule
          Properties:
            Pattern:
              source:
                - readysetcloud.agent
              detail-type:
                - Run Agent Task

  AgentCoreRuntime:
    Type: AWS::BedrockAgentCore::Runtime
    Properties:
      AgentRuntimeName: rsccore_agent
      AgentRuntimeArtifact:
        CodeConfiguration:
          Code:
            S3:
              Bucket: !Ref BucketName
              # Prefix MUST change when the artifact changes (deploy passes a
              # commit-SHA-versioned AgentArtifactKey). A static Prefix means CFN
              # never rolls this runtime and it serves a stale bundle. See the
              # AgentArtifactKey parameter.
              Prefix: !Ref AgentArtifactKey
          EntryPoint:
            # The esbuild bundle's entry (see agent-runtime/build.mjs). Verify this
            # literal against a real deploy — Node CodeZip EntryPoint conventions
            # differ from Python's agent.py, and cfn-lint's spec doesn't yet know
            # the Node runtimes.
            - index.js
          Runtime: NODE_22
      NetworkConfiguration:
        NetworkMode: PUBLIC
      # Inbound Auth: AgentCore validates a Cognito JWT (issuer/signature/expiry)
      # against the shared RSC user pool BEFORE the request reaches the runtime.
      # The browser presents its ID token as an OAuth bearer on the WebSocket
      # handshake (Sec-WebSocket-Protocol), so the hand-rolled SigV4 presign is
      # gone — see functions/websocket-connect.mjs and WebSocketChatClient.ts.
      #
      # AllowedAudience (not AllowedClients): the UI issues Cognito **ID tokens**
      # (getFreshIdToken), which carry `aud`=client-id and have no `client_id`
      # claim. AgentCore matches the token's `aud` against this list. If you ever
      # switch the UI to access tokens, use AllowedClients instead.
      AuthorizerConfiguration:
        # Property key is `CustomJWTAuthorizer` (NOT ...Configuration — that's the
        # schema's definition name). AuthorizerConfiguration is additionalProperties:
        # false, so the wrong key fails CloudFormation early validation
        # (AWS::EarlyValidation::PropertyValidation) at changeset creation.
        CustomJWTAuthorizer:
          DiscoveryUrl: !Sub 'https://cognito-idp.${AWS::Region}.amazonaws.com/${CognitoUserPool}/.well-known/openid-configuration'
          AllowedAudience:
            - !Ref CognitoUserPoolClient
      RoleArn: !GetAtt AgentCoreRole.Arn
      EnvironmentVariables:
        TABLE_NAME: !Ref AgentChatTable
        # AgentCore Memory resource id — enables cross-session memory in the
        # runtime (buildMemoryManager). Unset => no cross-session memory.
        AGENT_MEMORY_ID: !GetAtt AgentMemory.MemoryId
        BEDROCK_MODEL_ID: !Ref BedrockModelId
        BEDROCK_REGION: !Ref AWS::Region

  AgentCoreRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: bedrock-agentcore.amazonaws.com
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
      Policies:
        - PolicyName: AgentCorePolicy
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              # Pull the artifact zip from the assets bucket.
              - Effect: Allow
                Action: s3:GetObject
                Resource: !Sub 'arn:${AWS::Partition}:s3:::${BucketName}/${AgentArtifactKey}'
              # Logs + tracing + metrics.
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - logs:DescribeLogStreams
                  - logs:DescribeLogGroups
                Resource: !Sub 'arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/bedrock-agentcore/*'
              - Effect: Allow
                Action:
                  - xray:PutTraceSegments
                  - xray:PutTelemetryRecords
                  - xray:GetSamplingRules
                  - xray:GetSamplingTargets
                Resource: '*'
              - Effect: Allow
                Action: cloudwatch:PutMetricData
                Resource: '*'
                Condition:
                  StringEquals:
                    cloudwatch:namespace: bedrock-agentcore
              # Chat model invocation.
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                Resource:
                  - !Sub 'arn:${AWS::Partition}:bedrock:*::foundation-model/*'
                  - !Sub 'arn:${AWS::Partition}:bedrock:${AWS::Region}:${AWS::AccountId}:inference-profile/*'
              # Conversation snapshots (Strands session continuity) + autonomous
              # task rows (pk=TASK#..). UpdateItem drives the task lifecycle
              # (startTask claim / finishTask result — see @readysetcloud/agent).
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:Query
                  - dynamodb:BatchWriteItem
                Resource: !GetAtt AgentChatTable.Arn
              # Announce a finished autonomous run ("Agent Task Completed") so any
              # app can react — the result's path across the permissions boundary.
              - Effect: Allow
                Action: events:PutEvents
                Resource: !Sub arn:${AWS::Partition}:events:${AWS::Region}:${AWS::AccountId}:event-bus/default
              # Cross-session memory: write turns (createEvent) + retrieve records.
              - Effect: Allow
                Action:
                  - bedrock-agentcore:CreateEvent
                  - bedrock-agentcore:RetrieveMemoryRecords
                  - bedrock-agentcore:GetMemory
                Resource: !GetAtt AgentMemory.MemoryArn

  Secrets:
    Type: AWS::SecretsManager::Secret
    Properties:
      SecretString:
        Fn::Sub:
          - |-
            {
              "momento": "${MomentoApiKey}",
              "github": "${GitHubPAT}",
              "sendgrid":"${SendgridApiKey}",
              "openai": "${OpenAIApiKey}"
            }
          - GitHubPAT: !Ref GitHubPAT
            SendgridApiKey: !Ref SendgridApiKey
            MomentoApiKey: !Ref MomentoApiKey
            OpenAIApiKey: !Ref OpenAIApiKey

  SecretsParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /readysetcloud/secrets
      Type: String
      Value: !Ref Secrets
      Description: Arn for the Secrets Manager Secret for API Keys

  GitHubOwnerParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /readysetcloud/github-owner
      Type: String
      Value: !Ref GitHubOwner
      Description: Owner of the Ready, Set, Cloud GitHub repository

  GitHubRepoParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /readysetcloud/github-repo
      Type: String
      Value: !Ref GitHubRepo
      Description: Repository name of the Ready, Set, Cloud GitHub repository

  UpdateGitHubSourceCodeParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /readysetcloud/update-github-source-code
      Type: String
      Value: !Ref UpdateGitHubSourceCode
      Description: Whether to update the GitHub source code automatically

  AdminEmailParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /readysetcloud/admin-email
      Type: String
      Value: !Ref AdminEmail
      Description: Email address of the Ready, Set, Cloud administrator

  AssetsBucketParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /readysetcloud/assets-bucket
      Type: String
      Value: !Ref BucketName
      Description: Name of the S3 bucket where static assets are stored

  AmplifyAppIdParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /readysetcloud/amplify-app-id
      Type: String
      Value: !Ref AmplifyAppId
      Description: App identifier for the Ready, Set, Cloud Amplify app

  CacheNameParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /readysetcloud/cache-name
      Type: String
      Value: !Ref DefaultCacheName
      Description: Name of the Momento cache to use by default

  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: RSCUserPool
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false

  FreeMembershipGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      Description: Free membership. Default group for new users
      GroupName: rsc-free
      UserPoolId: !Ref CognitoUserPool
      Precedence: 10

  ProMembershipGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      Description: Pro membership
      GroupName: rsc-pro
      UserPoolId: !Ref CognitoUserPool
      Precedence: 5

  AuthCertificate:
    Type: AWS::CertificateManager::Certificate
    Condition: DeployCustomDomainSupport
    Properties:
      DomainName: !Sub authenticate.${RootDomainName}
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Sub authenticate.${RootDomainName}
          HostedZoneId: !Ref HostedZoneId

  CognitoUserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Condition: DeployCustomDomainSupport
    Properties:
      UserPoolId: !Ref CognitoUserPool
      Domain: !Sub authenticate.${RootDomainName}
      CustomDomainConfig:
        CertificateArn: !Ref AuthCertificate

  CustomDomainDnsRecord:
    Type: AWS::Route53::RecordSet
    Condition: DeployCustomDomainSupport
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Sub authenticate.${RootDomainName}
      ResourceRecords:
        - !GetAtt CognitoUserPoolDomain.CloudFrontDistribution
      TTL: 300
      Type: CNAME

  # The api.${RootDomainName} custom domain already exists in API Gateway
  # (owned by another stack, along with its ACM cert and Route53 record), so we
  # do not create the domain, certificate, or DNS here. Instead we attach the
  # CoreApi under the /core base path of that existing domain.
  CoreApiMapping:
    Type: AWS::ApiGateway::BasePathMapping
    Condition: DeployCustomDomainSupport
    # The auto-generated stage must exist before the mapping can bind to it.
    DependsOn: CoreRestApiProdStage
    Properties:
      DomainName: !Sub api.${RootDomainName}
      RestApiId: !Ref CoreRestApi
      Stage: Prod
      BasePath: core

  # --- AgentCore runtime WebSocket reverse proxy ---------------------------
  # Without this, the browser's wss:// URL points straight at
  #   bedrock-agentcore.<region>.amazonaws.com/runtimes/<runtimeArn>/ws
  # which exposes the AWS account id (embedded in the ARN) to every client. This
  # CloudFront distribution fronts the runtime under chat.${RootDomainName}: the
  # browser connects to wss://chat.${RootDomainName}/ws?<session-id query> with
  # the Cognito bearer in the Sec-WebSocket-Protocol subprotocol. CloudFront
  # prepends /runtimes/<arn> (OriginPath) and sets the Host back to the
  # bedrock-agentcore origin (the AllViewerExceptHostHeader managed policy, which
  # also forwards the Sec-WebSocket-Protocol header), so the runtime's inbound JWT
  # authorizer validates the same bearer. Only the URL is rewritten; auth is the
  # token, so nothing here is signed. The account id no longer appears at all.
  #
  # The ACM cert MUST be in us-east-1 for CloudFront — this stack deploys there,
  # so an in-stack certificate works (same pattern as AuthCertificate).
  ChatCertificate:
    Type: AWS::CertificateManager::Certificate
    Condition: DeployCustomDomainSupport
    Properties:
      DomainName: !Sub chat.${RootDomainName}
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Sub chat.${RootDomainName}
          HostedZoneId: !Ref HostedZoneId

  ChatProxyDistribution:
    Type: AWS::CloudFront::Distribution
    Condition: DeployCustomDomainSupport
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub 'AgentCore runtime WebSocket proxy (${RootDomainName})'
        Aliases:
          - !Sub chat.${RootDomainName}
        ViewerCertificate:
          AcmCertificateArn: !Ref ChatCertificate
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021
        Origins:
          - Id: agentcore-runtime
            DomainName: !Sub bedrock-agentcore.${AWS::Region}.amazonaws.com
            # Prepended to every request path: the browser sends "/ws" and the
            # origin receives "/runtimes/<arn>/ws". This is where the account-id-
            # bearing ARN is kept off the wire the client sees.
            OriginPath: !Sub '/runtimes/arn:${AWS::Partition}:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:runtime/${AgentCoreRuntime}'
            CustomOriginConfig:
              OriginProtocolPolicy: https-only
              OriginSSLProtocols:
                - TLSv1.2
        DefaultCacheBehavior:
          TargetOriginId: agentcore-runtime
          ViewerProtocolPolicy: https-only
          AllowedMethods: [GET, HEAD]
          CachedMethods: [GET, HEAD]
          # Managed CachingDisabled — a streaming socket handshake is never cached.
          CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
          # Managed AllViewerExceptHostHeader — forwards every viewer query param
          # (the runtime session id) and header (incl. Sec-WebSocket-Protocol,
          # which carries the bearer) while letting CloudFront set Host to the
          # bedrock-agentcore origin.
          OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac

  ChatProxyDnsRecord:
    Type: AWS::Route53::RecordSet
    Condition: DeployCustomDomainSupport
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Sub chat.${RootDomainName}
      Type: A
      AliasTarget:
        DNSName: !GetAtt ChatProxyDistribution.DomainName
        # Fixed CloudFront hosted-zone id — identical for every distribution.
        HostedZoneId: Z2FDTNDATAQYW2
        EvaluateTargetHealth: false

  CognitoUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: RSCUserPoolClient
      UserPoolId: !Ref CognitoUserPool
      AllowedOAuthFlows:
        - code
      AllowedOAuthScopes:
        - email
        - openid
        - profile
      CallbackURLs:
        - http://localhost:3000
        - http://localhost:3000/oauth2/idpresponse
      LogoutURLs:
        - http://localhost:3000/logout
      AllowedOAuthFlowsUserPoolClient: true
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH

  CognitoUserPoolIdParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /readysetcloud/auth/user-pool-id
      Type: String
      Value: !Ref CognitoUserPool
      Description: Cognito user pool ID for cross-service authorizer references

  CognitoUserPoolArnParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /readysetcloud/auth/user-pool-arn
      Type: String
      Value: !GetAtt CognitoUserPool.Arn
      Description: Cognito user pool ARN for cross-service authorizer references

  CognitoUserPoolClientIdParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /readysetcloud/auth/user-pool-client-id
      Type: String
      Value: !Ref CognitoUserPoolClient
      Description: Cognito user pool client ID for cross-service token issuance

  CognitoIdentityPool:
    Type: AWS::Cognito::IdentityPool
    Properties:
      IdentityPoolName: RSCIdentityPool
      AllowUnauthenticatedIdentities: false
      CognitoIdentityProviders:
        - ClientId: !Ref CognitoUserPoolClient
          ProviderName: !Sub cognito-idp.${AWS::Region}.amazonaws.com/${CognitoUserPool}

  CognitoAuthenticatedRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: 'Allow'
          Principal:
            Federated: 'cognito-identity.amazonaws.com'
          Action: 'sts:AssumeRoleWithWebIdentity'
          Condition:
            StringEquals:
              'cognito-identity.amazonaws.com:aud': !Ref CognitoIdentityPool
            'ForAnyValue:StringLike':
              'cognito-identity.amazonaws.com:amr': authenticated

  CognitoIdentityPoolRoles:
    Type: AWS::Cognito::IdentityPoolRoleAttachment
    Properties:
      IdentityPoolId: !Ref CognitoIdentityPool
      Roles:
        authenticated: !GetAtt CognitoAuthenticatedRole.Arn

  WebPBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref BucketName
      PolicyDocument:
        Statement:
          - Sid: PublicReadAllFiles
            Effect: Allow
            Principal: '*'
            Action: s3:GetObject
            Resource: !Sub 'arn:${AWS::Partition}:s3:::${BucketName}/*.webp'
          - Sid: PublicReadUiAssets
            Effect: Allow
            Principal: '*'
            Action: s3:GetObject
            Resource: !Sub 'arn:${AWS::Partition}:s3:::${BucketName}/ui/*'

  ImageResizing:
    Type: AWS::Serverless::Application
    Properties:
      Location:
        ApplicationId: arn:aws:serverlessrepo:us-east-1:745159065988:applications/image-optimizer-for-blogs
        SemanticVersion: 1.0.1
      Parameters:
        RootDomainName: !Ref RootDomainName
        HostedZoneId: !Ref HostedZoneId
        S3BucketName: !Ref BucketName
